name: LKS Mobile Auto Judge (Delayed Safe Mode)

on:
  push:
  workflow_dispatch:

jobs:
  judge:
    runs-on: ubuntu-latest

    steps:

      #################################
      # OPTIONAL DELAY
      #################################

      - name: Wait 30 minutes before judging
        run: sleep 1800


      #################################
      # CHECKOUT
      #################################

      - name: Checkout Repository
        uses: actions/checkout@v4


      #################################
      # INIT SCORE
      #################################

      - name: Initialize Score
        run: echo "SCORE=0" >> $GITHUB_ENV


      #################################
      # DETECT ANDROID PROJECT
      #################################

      - name: Detect Project Presence
        run: |
          if [ -f gradlew ]; then
            echo "ANDROID_PROJECT=true" >> $GITHUB_ENV
          else
            echo "ANDROID_PROJECT=false" >> $GITHUB_ENV
          fi


      #################################
      # SETUP JAVA
      #################################

      - name: Setup JDK 17
        if: env.ANDROID_PROJECT == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      #################################
      # GRADLE PERMISSION
      #################################

      - name: Grant Gradle Permission
        if: env.ANDROID_PROJECT == 'true'
        run: chmod +x gradlew || true


      #################################
      # BUILD APK
      #################################

      - name: Attempt Build APK (+20)
        if: env.ANDROID_PROJECT == 'true'
        run: |
          if ./gradlew assembleDebug; then
            echo "SCORE=$(($SCORE+20))" >> $GITHUB_ENV
          fi


      #################################
      # CHECK KOTLIN
      #################################

      - name: Check Kotlin Usage (+10)
        run: |
          if find . -name "*.kt" | grep -q .; then
            echo "SCORE=$(($SCORE+10))" >> $GITHUB_ENV
          fi


      #################################
      # REQUIRED ACTIVITIES
      #################################

      - name: Check Required Activities (+20)
        run: |
          REQUIRED=(
            "LoginActivity.kt"
            "BarangListActivity.kt"
            "BarangDetailActivity.kt"
            "TransaksiMasukActivity.kt"
            "TransaksiKeluarActivity.kt"
          )

          FOUND=0

          for file in "${REQUIRED[@]}"
          do
            if find . -name "$file" | grep -q .; then
              FOUND=$(($FOUND+1))
            fi
          done

          SCORE_ADD=$(($FOUND*4))
          echo "SCORE=$(($SCORE+$SCORE_ADD))" >> $GITHUB_ENV


      #################################
      # SAFE SOURCE PATH CHECK
      #################################

      - name: Detect source directory
        run: |
          if [ -d app/src ]; then
            echo "SRC_EXISTS=true" >> $GITHUB_ENV
          else
            echo "SRC_EXISTS=false" >> $GITHUB_ENV
          fi


      #################################
      # RECYCLERVIEW
      #################################

      - name: Check RecyclerView Usage (+10)
        if: env.SRC_EXISTS == 'true'
        run: |
          if grep -r "RecyclerView" app/src/ ; then
            echo "SCORE=$(($SCORE+10))" >> $GITHUB_ENV
          fi


      #################################
      # RETROFIT / OKHTTP
      #################################

      - name: Check Retrofit Usage (+10)
        if: env.SRC_EXISTS == 'true'
        run: |
          if grep -r "Retrofit" app/src/ || grep -r "OkHttp" app/src/ ; then
            echo "SCORE=$(($SCORE+10))" >> $GITHUB_ENV
          fi


      #################################
      # LOGIN ENDPOINT
      #################################

      - name: Check Login Endpoint (+5)
        if: env.SRC_EXISTS == 'true'
        run: |
          if grep -r "auth/v1/token" app/src/ ; then
            echo "SCORE=$(($SCORE+5))" >> $GITHUB_ENV
          fi


      #################################
      # TOKEN STORAGE
      #################################

      - name: Check Token Storage (+5)
        if: env.SRC_EXISTS == 'true'
        run: |
          if grep -r "SharedPreferences" app/src/ ; then
            echo "SCORE=$(($SCORE+5))" >> $GITHUB_ENV
          fi


      #################################
      # BARANG ENDPOINT
      #################################

      - name: Check Barang Endpoint (+5)
        if: env.SRC_EXISTS == 'true'
        run: |
          if grep -r "/rest/v1/barang" app/src/ ; then
            echo "SCORE=$(($SCORE+5))" >> $GITHUB_ENV
          fi


      #################################
      # BARANG MASUK
      #################################

      - name: Check Barang Masuk Endpoint (+5)
        if: env.SRC_EXISTS == 'true'
        run: |
          if grep -r "barang_masuk" app/src/ ; then
            echo "SCORE=$(($SCORE+5))" >> $GITHUB_ENV
          fi


      #################################
      # BARANG KELUAR
      #################################

      - name: Check Barang Keluar Endpoint (+5)
        if: env.SRC_EXISTS == 'true'
        run: |
          if grep -r "barang_keluar" app/src/ ; then
            echo "SCORE=$(($SCORE+5))" >> $GITHUB_ENV
          fi


      #################################
      # FILTER FEATURE
      #################################

      - name: Check Filter Feature (+5)
        if: env.SRC_EXISTS == 'true'
        run: |
          if grep -r "kategori_id" app/src/ ; then
            echo "SCORE=$(($SCORE+5))" >> $GITHUB_ENV
          fi


      #################################
      # EXPORT SCORE.JSON
      #################################

      - name: Export score.json
        run: |
          mkdir -p public
          echo "{ \"score\": \"$SCORE\" }" > public/score.json


      #################################
      # COMMIT SCORE.JSON
      #################################

      - name: Commit score.json
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/score.json
          git commit -m "update autojudge score" || echo "no changes"
          git push


      #################################
      # SUMMARY
      #################################

      - name: Summary Output
        run: |
          echo "## 🏁 Auto Judge Result" >> $GITHUB_STEP_SUMMARY
          echo "Final Score: **$SCORE / 100**" >> $GITHUB_STEP_SUMMARY
